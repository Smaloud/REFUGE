data:
  root: REFUGE
  image_size: 512

model:
  name: attention_unet
  num_classes: 3
  base_channels: 32

loss:
  name: topology
  lambda_topology: 0.5

train:
  epochs: 40
  batch_size: 4
  num_workers: 4
  optimizer: adam
  lr: 0.0003
  weight_decay: 0.00001
  scheduler: cosine

output_dir: outputs/checkpoints/task2_refuge_topology

